<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARIZONA</title>
    <meta name="author" content="George Adams">
    <meta name="description"
      content="Arizona - A responsive page showcasing Arizona's geography and weather.">
    <link rel="stylesheet" href="styles/place.css">
    <link rel="stylesheet" href="styles/place-large.css">
    <script src="scripts/place.js" defer></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
      href="https://fonts.googleapis.com/css2?family=Merriweather:ital,opsz,wght@0,18..144,300..900;1,18..144,300..900&family=Tangerine:wght@400;700&display=swap"
      rel="stylesheet">
</head>

<body>
    <header>
        <h1>ARIZONA</h1>
    </header>
    <main>
        <div class="main-content">

            <div class="image">
                <picture>
                    <source srcset="images/hero-large.webp" media="(min-width: 1000px)">
                    <source srcset="images/hero-medium.webp" media="(min-width: 600px)">
                    <img src="images/hero-small.webp" alt="UTAH|Salt LAke City" width="600"
                      height="300">
                </picture>
            </div>
            <section class="data">
                <h2>Data</h2>
                <p><strong>Area:</strong> <span>113,990 sq miles</span></p>
                <p><strong>Population:</strong> <span>7.62 Million</span></p>
                <p><strong>Capital:</strong> <span>Phoenix</span></p>
                <p><strong>Language:</strong> <span>Spanish</span></p>
                <p><strong>Currency:</strong> <span>USD</span></p>
                <p><strong>Time Zone:</strong> <span>MST</span></p>
                <p><strong>Calling Code:</strong><span>+1</span></p>
                <p><strong>Internet TLD:</strong><span>.az</span></p>
            </section>

            <section class="weather">
                <h2>Weather</h2>
                <img id="weather" src="images/weather-icon.svg" alt="Weather image">
                <p><strong>Temperature: </strong><span>32°C </span></p>
                <p><strong>Conditions:</strong><span>Sunny</span> </p>
                <p><strong>Wind:</strong><span> 0 km/h</span></p>
                <p><strong>Wind Chill:</strong><span id="wind-chill"></span></p>
            </section>
        </div>
    </main>
    <footer>
        <p id="copyright">©️<span id="currentyear"></span>George Adams 🌵 Tucson, Az</p>
        <p id="lastmodified"></p>

    </footer>
</body>

</html>
