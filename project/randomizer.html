<html lang="en-US">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <meta name="author" content="George Adams">
  <title>Desert Dungeon — Dice Roller</title>
  <meta name="description" content="Desert Dungeon Dice Roller Page! Roll some dice!">
  <link rel="stylesheet" href="styles/randomizer.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
        href="https://fonts.googleapis.com/css2?family=Merriweather:ital,opsz,wght@0,18..144,300..900;1,18..144,300..900&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">
</head>

<body>
    <div class="container">
        <header>
            <nav class="main-nav" aria-label="Primary">
                <a class="nav-item" href="dungeon.html">Home</a>
                <a class="nav-item active" href="randomizer.html">Dice Roller</a>
                <a class="nav-item" href="monster-2.html">Monsters</a>
                <a class="nav-item" href="game.html">Game</a>
            </nav>
            <div class="logo">
                <img src="images/dd-logo.webp" alt="Desert Dungeon Logo">
                <p>Roll this dice!</p>
            </div>
            <h1><i class="fas fa-dice"></i> Desert Dungeon Dice Roller</h1>
            <p>Click the button! Test your luck!</p>
        </header>

        <div class="dice-conatainer">
            <div class="dice" id="dice">
                <!-- Dice faces will be inserted here -->
                <div class="dice-face face-1">1</div>
                <div class="dice-face face-2">2</div>
                <div class="dice-face face-3">3</div>
                <div class="dice-face face-4">4</div>
                <div class="dice-face face-5">5</div>
                <div class="dice-face face-6">6</div>
            </div>
        </div>

        <div class="controls">
            <button class="roll-btn" id="roll-btn">Roll Dice</button>
        </div>

        <div class="result" id="result">
            Roll to see the result!
        </div>

        <div class="history">
            <h2><i class="fas fa-history"></i> Roll History</h2>
            <ul id="history-list">
                <!-- History items will be inserted here -->
            </ul>
        </div>
    </div>
    <script>
        document.addEventListener("DOMContentLoaded", function () {
            const dice = document.getElementById("dice");
            const rollBtn = document.getElementById("roll-btn");
            const result = document.getElementById("result");
            const historyList = document.getElementById("history-list");

            let rollHistory = [];
            let rollCount = 0;

            // Function to roll the dice
            function rollDice() {
                // Add a little animation to the dice
                dice.classList.add("rolling");

                // Disable button while rolling
                rollBtn.disabled = true;

                //generate random number between 1 and 6
                const randomNumber = Math.floor(Math.random() * 6);

                // After animation completes
                setTimeout(() => {
                    // Remove rolling animation
                    dice.classList.remove("rolling");

                    // Set dice to show correct face
                    setDiceFace(randomNumber);

                    // Display result
                    result.innerHTML = `You rolled a <span style="color: #ff6b6b; font-weight: bold; font-size: 2rem">${randomNumber}</span>!`;

                    // Add to history
                    addToHistory(randomNumber);

                    // Re-enable button
                    rollBtn.disabled = false;
                }, 1000); // Match this duration to your CSS animation

            }

            // Function to set the dice face based on the rolled number
            function setDiceFace(number) {
                // Reset all faces
                dice.style.transform = "rotateX(0) rotateY(0)";

                switch (number) {
                    case 1:
                        dice.style.transform = "rotateX(0) rotateY(0)";
                        break;
                    case 2:
                        dice.style.transform = "rotateX(180deg) rotateY(0)";
                        break;
                    case 3:
                        dice.style.transform = "rotateX(0) rotateY(90deg)";
                        break;
                    case 4:
                        dice.style.transform = "rotateX(0) rotateY(-90deg)";
                        break;
                    case 5:
                        dice.style.transform = "rotateX(90deg) rotateY(0)";
                        break;
                    case 6:
                        dice.style.transform = "rotateX(-90deg) rotateY(0)";
                        break;
                }
            }

            // Function to add roll to history
            function addToHistory(number) {
                rollCount++;
                rollHistory.unshift({ roll: rollCount, value: number });

                // Update history list
                updateHistoryList();
            }

            // Function to update the history list
            function updateHistoryList() {
                historyList.innerHTML = "";

                // Add up to 10 recent rolls
                const recentRolls = rollHistory.slice(0, 10);
                recentRolls.forEach(item => {
                    const li = document.createElement("li");
                    li.innerHTML = `Roll ${item.roll}: <span style="color: #ff6b6b; font-weight: bold;">${item.value}</span>`;
                    historyList.appendChild(li);
                });
            }

            // Event Listener for roll button
            rollBtn.addEventListener("click", rollDice);

            // Initial dice face
            const initialNumber = Math.floor(Math.random() * 6) + 1;
            setDiceFace(initialNumber);
            result.innerHTML = `The die is showing <span style="color: #ff6b6b; font-weight: bold; font-size: 3rem">${initialNumber}</span>`;
        });
    </script>
</body>
